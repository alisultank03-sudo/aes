    <script type="module" src="https://unpkg.com"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: grid; 
            /* Сетка 4 колонки, строки подстроятся автоматически */
            grid-template-columns: repeat(4, 1fr); 
            gap: 4px; 
            height: 100vh; 
            padding: 4px; 
            box-sizing: border-box; 
        }
        .video-box { 
            position: relative; 
            background: #111; 
            width: 100%; 
            height: 100%; 
        }
        go2rtc-player { 
            width: 100%; 
            height: 100%; 
            display: block; 
        }
        .camera-title {
            position: absolute; 
            top: 5px; 
            left: 5px; 
            background: rgba(0, 0, 0, 0.6);
            color: #fff; 
            padding: 2px 6px; 
            font-family: sans-serif; 
            font-size: 12px; 
            border-radius: 3px; 
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
