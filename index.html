<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Видеостена 11 камер</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: grid; 
            /* Сетка 4 колонки, строки подстроятся автоматически */
            grid-template-columns: repeat(4, 1fr); 
            gap: 4px; 
            height: 100vh; 
            padding: 4px; 
            box-sizing: border-box; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            background: #111; 
        }
    </style>
</head>
<body>
    <!-- Замените 192.168.6.56 на ваш реальный IP адрес, например 192.168.7.50 -->
    <iframe src="http://192.168.6.56:1984/webrtc.html?src=stanky_cpu&media=video"></iframe>
    <iframe src="http://192.168.6.56:1984/webrtc.html?src=pribor&media=video"></iframe>
    <iframe src="http://192.168.6.56:1984/webrtc.html?src=pribor2&media=video"></iframe>
    <iframe src="http://192.168.6.56:1984/webrtc.html?src=terminal&media=video"></iframe>
    <iframe src="http://192.168.6.56:1984/webrtc.html?src=terminal2&media=video"></iframe>
    <iframe src="http://192.168.6.56:1984/webrtc.html?src=camera1&media=video"></iframe>
    <iframe src="http://192.168.6.56:1984/webrtc.html?src=camera2&media=video"></iframe>
    <iframe src="http://192.168.6.56:1984/webrtc.html?src=camera3&media=video"></iframe>
    <iframe src="http://192.168.6.56:1984/webrtc.html?src=camera4&media=video"></iframe>

</body>
</html>
